apiVersion: v1
kind: ConfigMap
metadata:
  name: gpuaas-frontend-config
data:
  BACKEND_URL: "http://gpuaas-backend:8000"
  API_V1_PREFIX: "/api/v1"
---
apiVersion: v1
kind: Pod
metadata:
  name: gpuaas-frontend
  labels:
    app: gpuaas-frontend
spec:
  containers:
  - name: frontend
    image: localhost/gpuaas-frontend:latest
    command:
    - poetry
    - run
    - streamlit
    - run
    - main.py
    - --server.port
    - "8501"
    - --server.address
    - "0.0.0.0"
    envFrom:
    - configMapRef:
        name: gpuaas-frontend-config
    ports:
    - containerPort: 8501
      hostPort: 8501
    resources:
      requests:
        cpu: "250m"
        memory: "256Mi"
      limits:
        cpu: "1"
        memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: gpuaas-frontend
spec:
  selector:
    app: gpuaas-frontend
  ports:
  - protocol: TCP
    port: 8501
    targetPort: 8501
