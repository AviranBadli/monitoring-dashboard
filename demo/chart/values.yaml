replicaCount: 1

image:
  repository: quay.io/aicatalyst/kueue-dashboard
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8501

route:
  enabled: true
  host: ""

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

serviceAccount:
  create: true
  name: ""

rbac:
  create: true
