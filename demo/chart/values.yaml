replicaCount: 1

image:
  repository: quay.io/aicatalyst/kueue-dashboard
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8501

route:
  enabled: true
  host: ""

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

serviceAccount:
  create: true
  name: ""

logLevel: INFO

thanos:
  url: "https://thanos-querier.openshift-monitoring.svc.cluster.local:9091"

rbac:
  create: true

# Kueue Kubernetes State Metrics integration for custom resources
kueueKsm:
  enabled: true
  image:
    repository: registry.k8s.io/kube-state-metrics/kube-state-metrics
    tag: v2.13.0
  serviceMonitor:
    enabled: true
    interval: 10s
