{{- if .Values.kueueKsm.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "kueue-dashboard.fullname" . }}-ksm
  labels:
    {{- include "kueue-dashboard.labels" . | nindent 4 }}
    app.kubernetes.io/component: ksm
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kueue-dashboard.fullname" . }}-ksm
  labels:
    {{- include "kueue-dashboard.labels" . | nindent 4 }}
    app.kubernetes.io/component: ksm
rules:
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["list", "watch"]
  - apiGroups: ["kueue.x-k8s.io"]
    resources: ["localqueues", "clusterqueues", "workloads"]
    verbs: ["list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kueue-dashboard.fullname" . }}-ksm
  labels:
    {{- include "kueue-dashboard.labels" . | nindent 4 }}
    app.kubernetes.io/component: ksm
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kueue-dashboard.fullname" . }}-ksm
subjects:
  - kind: ServiceAccount
    name: {{ include "kueue-dashboard.fullname" . }}-ksm
    namespace: {{ .Release.Namespace }}
{{- end }}
