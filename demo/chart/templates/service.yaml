apiVersion: v1
kind: Service
metadata:
  name: {{ include "kueue-dashboard.fullname" . }}
  labels:
    {{- include "kueue-dashboard.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8501
      protocol: TCP
  selector:
    {{- include "kueue-dashboard.selectorLabels" . | nindent 4 }}
