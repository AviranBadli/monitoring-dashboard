apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kueue-dashboard.fullname" . }}
  labels:
    {{- include "kueue-dashboard.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "kueue-dashboard.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kueue-dashboard.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "kueue-dashboard.serviceAccountName" . }}
      containers:
        - name: dashboard
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "streamlit"
            - "run"
            - "main.py"
            - "--server.port"
            - "8501"
            - "--server.address"
            - "0.0.0.0"
            - "--server.headless"
            - "true"
            - "--server.enableCORS"
            - "false"
            - "--server.enableXsrfProtection"
            - "false"
          env:
            - name: LOG_LEVEL
              value: {{ .Values.logLevel | quote }}
            - name: THANOS_URL
              value: {{ .Values.thanos.url | quote }}
            - name: SHOW_MIG
              value: {{ .Values.showMig | quote }}
            - name: SHOW_GPU_UTIL
              value: {{ .Values.showGpuUtil | quote }}
          ports:
            - containerPort: 8501
              protocol: TCP
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 5
            periodSeconds: 10
